<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Timer App</title>
    <link rel="stylesheet" href="lifetimer.css" />
    <script
      src="https://kit.fontawesome.com/6c5a67e784.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="background">
      <div id="initialText" class="container">
        <h1>Kindly Enter Your Date Of Birth</h1>
      </div>
      <div id="afterDOBBtntxt" class="container hide">
        <h1>How Much Life Journey Covered, Till Now</h1>
        <div class="time_container">
          <div class="time-box">
            <div id="year">00</div>
            <span>Years</span>
          </div>
          <div class="time-box">
            <div id="month">00</div>
            <span>Months</span>
          </div>
          <div class="time-box">
            <div id="day">00</div>
            <span>Days</span>
          </div>
          <div class="time-box">
            <div id="hour">00</div>
            <span>Hours</span>
          </div>
          <div class="time-box">
            <div id="minute">00</div>
            <span>Minutes</span>
          </div>
          <div class="time-box">
            <div id="second">00</div>
            <span>Seconds</span>
          </div>
        </div>
      </div>
      <div class="settings">
        <i id="settingIcon" class="fa fa-cog"> </i>
        <div id="settingContent" class="setting_content hide">
          <input type="date" id="dobInput" />
          <button id="dobButtion">Add DOB</button>
        </div>
      </div>
    </div>
    <script src="lifetimer.js"></script>
  </body>
</html>
